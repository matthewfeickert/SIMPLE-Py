schema_version: 1

context:
  version: 0.1.0

package:
  name: rattler-collatz
  version: ${{ version }}

source:
  url: https://github.com/scikit-build/SIMPLE-Py/archive/8c60b848fe7f8d72391d49c2130b27c88aad8dfb.tar.gz
  # pixi global install curl openssl
  # curl -sL <url> | openssl sha256
  sha256: fbd494e7216db678ec5b5f9f7bf7713faaf142690fd46298dcdd2e4d202dcc23

build:
  number: 0
  script:
    env:
      CMAKE_GENERATOR: Ninja
    content:
      - cd examples/5_02_pixi_build/compiled
      - ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  build:
    # This is provided by conda-forge and so needs to be commented out for now.
    # - ${{ stdlib("c") }}
    - ${{ compiler("cxx") }}
    - cmake
    - ninja
    - if: build_platform != host_platform
      then:
        - cross-python_${{ host_platform }}
        - python
  host:
    - python
    - pip
    - scikit-build-core
    - pybind11
  run:
    - python

tests:
  - python:
      imports:
        - collatz
      pip_check: true

about:
  homepage: https://github.com/scikit-build/SIMPLE-Py
  license: BSD-3-Clause
  license_file: examples/5_02_pixi_build/compiled/LICENSE
  summary: Single-line summary of the package.
  description: |
    One or two paragraphs with more information about the package.
  repository: https://github.com/scikit-build/SIMPLE-Py
  documentation: https://github.com/scikit-build/SIMPLE-Py

extra:
  recipe-maintainers:
    # GitHub username
    - henryiii
    - matthewfeickert
