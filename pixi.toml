[workspace]
channels = ["conda-forge"]
name = "SIMPLE-Py"
platforms = ["linux-64", "osx-arm64"]
version = "0.1.0"

[tasks.bun-install]
description = "Install the frozen environment with Bun"
cmd = "bun install --frozen-lockfile"

[tasks.build-slides]
description = "Build the slides with Bun"
cmd = "bun run build-slides"

[tasks.build-book]
description = "Build the MyST Markdown book"
cmd = "myst build --html"

[tasks.serve-book]
description = "Build and serve the MyST Markdown book"
cmd = "myst start"

[tasks.build]
description = "Run the build with Bun"
cmd = "bun run build"

[tasks.clean-build]
description = "Remove the build directory for a clean build"
cmd = "rm -rf ./_build"

[tasks.start]
depends-on = ["bun-install", "build-slides", "serve-book"]

[dependencies]
bun = ">=1.3.11,<2"
mystmd = ">=1.10.1,<2"
